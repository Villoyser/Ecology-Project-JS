<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTracker - Tracker</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="./index.html" class="logo">
            <i class="fas fa-leaf"></i>
            EcoTracker
        </a>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./tracker.html">Tracker</a>
            <a href="./resources.html">Learn</a>
        </div>
    </nav>

    <div style="max-width: 1100px; margin: 40px auto; padding: 0 20px;">
        <h1 style="text-align:center; font-size:2.8rem; color:#064e3b;">Today's Eco Actions</h1>
        <p style="text-align:center; color:#666; font-size:1.3rem; margin:15px 0 40px;">Tap the actions you did today</p>

        <div id="actions-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;"></div>

        <button onclick="calculateSavings()" 
                style="display:block; width:100%; max-width:400px; margin:40px auto; padding:18px; font-size:1.3rem; font-weight:bold; background:#10b981; color:white; border:none; border-radius:50px; cursor:pointer;">
            Calculate Savings
        </button>

        <div class="result" id="result">
            <h3 style="color:#064e3b; margin-bottom:10px;">CO₂ Saved Today</h3>
            <div id="savings-amount" style="font-size:4.5rem; font-weight:bold; color:#10b981;">0</div>
            <p style="font-size:1.3rem; color:#666;">grams</p>
            <p id="message" style="margin-top:25px; font-size:1.25rem;"></p>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
