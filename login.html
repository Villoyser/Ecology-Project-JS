<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTracker - Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="./index.html" class="logo">
            <i class="fas fa-leaf"></i> EcoTracker
        </a>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./register.html">Register</a>
        </div>
    </nav>

    <div class="auth-container">
        <h1><i class="fas fa-sign-in-alt"></i> Welcome Back</h1>
        
        <div id="login-error" class="error-message"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="Enter email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password" required>
        </div>

        <button onclick="handleLogin()" class="auth-btn">Login</button>

        <div class="switch-link">
            Don't have an account? <a href="./register.html">Register here</a>
        </div>
    </div>

    <script src="./main.js"></script>
    <script>
        function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            const result = loginUser(email, password);
            const errorDiv = document.getElementById('login-error');
            
            errorDiv.textContent = result.message;

            if (result.success) {
                errorDiv.style.color = "#10b981";
                setTimeout(() => window.location.href = "tracker.html", 800);
            } else {
                errorDiv.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
