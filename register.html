<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTracker - Register</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="./index.html" class="logo">
            <i class="fas fa-leaf"></i> EcoTracker
        </a>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./login.html">Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <h1><i class="fas fa-user-plus"></i> Create Account</h1>
        
        <div id="register-error" class="error-message"></div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="reg-username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="Enter email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Create password" required>
        </div>

        <button onclick="handleRegister()" class="auth-btn">Register</button>

        <div class="switch-link">
            Already have an account? <a href="./login.html">Login here</a>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        function handleRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;

            if (!username || !email || !password) {
                alert("All fields are required!");
                return;
            }

            const result = registerUser(username, email, password);
            
            const errorDiv = document.getElementById('register-error');
            errorDiv.textContent = result.message;

            if (result.success) {
                errorDiv.style.color = "#10b981";
                setTimeout(() => window.location.href = "login.html", 1500);
            } else {
                errorDiv.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
